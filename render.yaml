services:
  - type: web
    name: hr-eval-app
    env: node
    region: oregon
    plan: starter
    buildCommand: cd frontend && npm install --include=dev && npm run build && cd ../backend && npm install
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/hr_eval.db
    disk:
      name: hr-eval-db
      mountPath: /var/data
      sizeGB: 1
