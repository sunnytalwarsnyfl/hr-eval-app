services:
  - type: web
    name: hr-eval-app
    env: node
    region: oregon
    plan: starter
    buildCommand: NPM_CONFIG_PRODUCTION=false npm --prefix frontend install && npm --prefix frontend run build && npm --prefix backend install
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/hr_eval.db
    disk:
      name: hr-eval-db
      mountPath: /var/data
      sizeGB: 1
