services:
  - type: web
    name: hr-eval-app
    env: node
    region: oregon
    plan: starter
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/hr_eval.db
      - key: APP_URL
        value: https://hr-eval-app.onrender.com
      - key: FROM_NAME
        value: SIPS Healthcare HR
      - key: FROM_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: INVITE_EXPIRY_HOURS
        value: "48"
      - key: UPLOAD_DIR
        value: /var/data/uploads
    disk:
      name: hr-eval-db
      mountPath: /var/data
      sizeGB: 1
